name: Deploy RetailPulse to AWS EC2

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy_code:
    name: Upload files to EC2 via SSM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment archive
        run: |
          cd stockmanagement
          tar -czf ../deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='db.sqlite3' \
            --exclude='celerybeat-schedule.db' \
            --exclude='*.log' \
            --exclude='.env' \
            .
          cd ..

      - name: Upload archive to S3 and deploy to EC2
        run: |
          # Validate required secrets
          if [ -z "${{ secrets.AWS_S3_DEPLOY_BUCKET }}" ]; then
            echo "❌ Error: AWS_S3_DEPLOY_BUCKET secret is not set in GitHub repository secrets"
            echo "Please add AWS_S3_DEPLOY_BUCKET to your repository secrets at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          if [ -z "${{ secrets.AWS_EC2_INSTANCE_ID }}" ]; then
            echo "❌ Error: AWS_EC2_INSTANCE_ID secret is not set"
            exit 1
          fi

          if [ -z "${{ secrets.EC2_TARGET_DIR }}" ]; then
            echo "❌ Error: EC2_TARGET_DIR secret is not set"
            exit 1
          fi

          TIMESTAMP=$(date +%s)
          DEPLOY_KEY="deploy-${TIMESTAMP}.tar.gz"
          aws s3 cp deploy.tar.gz s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/$DEPLOY_KEY

          # Debug: Verify instance is accessible via SSM
          echo "🔍 Checking if instance is accessible via SSM..."
          INSTANCE_ID="${{ secrets.AWS_EC2_INSTANCE_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          echo "Instance ID: $INSTANCE_ID"
          echo "Region: $AWS_REGION"

          # First, check EC2 instance state
          echo "📋 Checking EC2 instance state..."
          INSTANCE_STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text 2>/dev/null || echo "unknown")

          echo "Instance state: $INSTANCE_STATE"

          if [ "$INSTANCE_STATE" != "running" ]; then
            echo "❌ Error: Instance is not in 'running' state. Current state: $INSTANCE_STATE"
            echo "Please ensure the instance is running before deploying."
            exit 1
          fi

          # Check if instance is registered in SSM
          echo "📋 Checking SSM registration..."
          INSTANCE_INFO=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --output json 2>/dev/null || echo '{"InstanceInformationList":[]}')

          INSTANCE_COUNT=$(echo "$INSTANCE_INFO" | jq '.InstanceInformationList | length' 2>/dev/null || echo "0")

          if [ "$INSTANCE_COUNT" -eq 0 ]; then
            echo "❌ Error: Instance $INSTANCE_ID is not registered in SSM Fleet Manager."
            echo ""
            echo "🔧 Troubleshooting steps:"
            echo "1. Verify SSM Agent is installed and running on the instance:"
            echo "   sudo snap services amazon-ssm-agent"
            echo ""
            echo "2. Check SSM Agent logs for errors:"
            echo "   sudo snap logs amazon-ssm-agent --lines=50 | grep -i error"
            echo ""
            echo "3. Verify the instance has an IAM role with 'AmazonSSMManagedInstanceCore' policy"
            echo ""
            echo "4. Check Security Groups allow outbound HTTPS (443) to AWS SSM endpoints"
            echo ""
            echo "5. Try restarting the EC2 instance to force SSM Agent re-registration"
            echo ""
            echo "6. Wait 5-10 minutes after instance start for SSM Agent to register"
            echo ""
            echo "Once the instance appears in Systems Manager → Fleet Manager, retry the deployment."
            exit 1
          fi

          echo "✅ Instance is registered in SSM"
          echo "$INSTANCE_INFO" | jq '.InstanceInformationList[0]' || echo "$INSTANCE_INFO"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'mkdir -p ${{ secrets.EC2_TARGET_DIR }}',
              'cd ${{ secrets.EC2_TARGET_DIR }}',
              'aws s3 cp s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/$DEPLOY_KEY /tmp/deploy.tar.gz',
              'tar -xzf /tmp/deploy.tar.gz',
              'rm -f /tmp/deploy.tar.gz',
              'echo \"Files deployed successfully\"'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

          # Wait for command to complete
          sleep 10

          # Get command output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "StandardOutputContent" \
            --output text

          # Check status
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

  test_configuration:
    name: Test production configuration on EC2
    runs-on: ubuntu-latest
    needs: deploy_code

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Test configuration on EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.AWS_EC2_INSTANCE_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export TARGET_DIR=\"${{ secrets.EC2_TARGET_DIR }}\"',
              'export PROD_ENV=\"${{ secrets.PROD_ENV }}\"',
              'echo \"📝 Writing .env file...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && echo \\\"$PROD_ENV\\\" > .env\"',
              'echo \"📦 Checking/installing uv for ubuntu user...\"',
              'if ! sudo -u ubuntu /home/ubuntu/.local/bin/uv --version >/dev/null 2>&1; then',
              '  sudo -u ubuntu bash -c \"curl -LsSf https://astral.sh/uv/install.sh | sh\"',
              'fi',
              'echo \"📦 Installing/updating dependencies...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv sync --frozen\"',
              'echo \"🔍 Checking required environment variables...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && required_vars=(SECRET_KEY JWT_SECRET_KEY DATABASE_NAME DATABASE_USER DATABASE_PASSWORD DATABASE_HOST DATABASE_PORT REDIS_URL) && for var in \\\"\\${required_vars[@]}\\\"; do if [ -z \\\"\\${!var}\\\" ]; then echo \\\"❌ Missing required environment variable: $var\\\"; exit 1; fi; done\"',
              'echo \"🔍 Checking for pending migrations...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py makemigrations --check\"; then',
              '  echo \"❌ Pending migrations detected\"',
              '  exit 1',
              'fi',
              'echo \"🔍 Testing collectstatic (dry-run)...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py collectstatic --noinput --dry-run\"; then',
              '  echo \"❌ collectstatic dry-run failed\"',
              '  exit 1',
              'fi',
              'echo \"🔍 Running Django deploy checks...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py check --deploy\"; then',
              '  echo \"❌ Django deploy checks failed\"',
              '  exit 1',
              'fi',
              'echo \"✅ Configuration tests passed successfully.\"'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          # Wait and check status
          sleep 15

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardOutputContent" \
            --output text)

          ERROR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardErrorContent" \
            --output text)

          echo "$OUTPUT"
          if [ -n "$ERROR" ]; then
            echo "Errors: $ERROR"
          fi

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Configuration test failed with status: $STATUS"
            exit 1
          fi

  remote_setup_and_launch:
    name: Apply migrations and launch services on EC2
    runs-on: ubuntu-latest
    needs: test_configuration

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup and deploy on EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.AWS_EC2_INSTANCE_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export TARGET_DIR=\"${{ secrets.EC2_TARGET_DIR }}\"',
              'echo \"📦 Checking/installing uv for ubuntu user...\"',
              'if ! sudo -u ubuntu /home/ubuntu/.local/bin/uv --version >/dev/null 2>&1; then',
              '  sudo -u ubuntu bash -c \"curl -LsSf https://astral.sh/uv/install.sh | sh\"',
              'fi',
              'echo \"📦 Installing/updating dependencies...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv sync --frozen\"',
              'echo \"🗄️  Applying database migrations...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py migrate\"; then',
              '  echo \"❌ Migrations failed!\"',
              '  exit 1',
              'fi',
              'echo \"📁 Collecting static files...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py collectstatic --noinput\"; then',
              '  echo \"❌ collectstatic failed!\"',
              '  exit 1',
              'fi',
              'echo \"📋 Supervisor status before restart...\"',
              'sudo supervisorctl status || true',
              'sudo supervisorctl reread',
              'sudo supervisorctl update',
              'echo \"🔄 Restarting mahplan services...\"',
              'sudo supervisorctl restart mahplan-web mahplan-celery mahplan-celerybeat',
              'sleep 5',
              'echo \"📋 Supervisor status after restart...\"',
              'sudo supervisorctl status mahplan-web mahplan-celery mahplan-celerybeat || true',
              'echo \"🔍 Verifying services are running...\"',
              'if ! sudo supervisorctl status mahplan-web | grep -q \"RUNNING\"; then',
              '  echo \"❌ mahplan-web failed to start!\"',
              '  sudo supervisorctl tail -100 mahplan-web stderr || true',
              '  exit 1',
              'fi',
              'if ! sudo supervisorctl status mahplan-celery | grep -q \"RUNNING\"; then',
              '  echo \"❌ mahplan-celery failed to start!\"',
              '  sudo supervisorctl tail -100 mahplan-celery stderr || true',
              '  exit 1',
              'fi',
              'if ! sudo supervisorctl status mahplan-celerybeat | grep -q \"RUNNING\"; then',
              '  echo \"❌ mahplan-celerybeat failed to start!\"',
              '  sudo supervisorctl tail -100 mahplan-celerybeat stderr || true',
              '  exit 1',
              'fi',
              'echo \"✅ All Supervisor services are running\"',
              'if sudo nginx -t; then',
              '  sudo systemctl reload nginx',
              '  echo \"✅ nginx reloaded successfully\"',
              'else',
              '  echo \"❌ nginx configuration test failed!\"',
              '  exit 1',
              'fi',
              'echo \"✅ Deployment completed successfully.\"'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          sleep 20

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardOutputContent" \
            --output text)

          ERROR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardErrorContent" \
            --output text)

          echo "$OUTPUT"
          if [ -n "$ERROR" ]; then
            echo "Errors: $ERROR"
          fi

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            exit 1
          fi
