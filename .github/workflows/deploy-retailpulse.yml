name: Deploy RetailPulse to EC2

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy_backend:
    name: Deploy Django App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy backend files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "stockmanagement/, !.git"
          target: ${{ secrets.EC2_TARGET_DIR }}
          strip_components: 0
          rm: false
          overwrite: true

  remote_setup:
    runs-on: ubuntu-latest
    needs: deploy_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            cd ${{ secrets.EC2_TARGET_DIR }}

            echo "${{ secrets.PROD_ENV }}" > .env

            /home/ubuntu/.local/bin/uv sync --frozen

            /home/ubuntu/.local/bin/uv run python manage.py migrate

            /home/ubuntu/.local/bin/uv run python manage.py collectstatic --noinput

            sudo supervisorctl reread
            sudo supervisorctl update
            sudo supervisorctl restart maahbusiness-web maahbusiness-celery maahbusiness-celerybeat
            sudo nginx -t && sudo systemctl reload nginx
