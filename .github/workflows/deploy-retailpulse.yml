name: Deploy RetailPulse to AWS EC2

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy_code:
    name: Upload files to EC2 via SSM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment archive
        run: |
          cd stockmanagement
          tar -czf ../deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='db.sqlite3' \
            --exclude='celerybeat-schedule.db' \
            --exclude='*.log' \
            --exclude='.env' \
            .
          cd ..

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Upload archive to S3 and deploy to EC2
        run: |
          set +e  # Don't exit on error immediately

          # Validate required secrets
          if [ -z "${{ secrets.AWS_S3_DEPLOY_BUCKET }}" ]; then
            echo "❌ Error: AWS_S3_DEPLOY_BUCKET secret is not set in GitHub repository secrets"
            echo "Please add AWS_S3_DEPLOY_BUCKET to your repository secrets at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          if [ -z "${{ secrets.AWS_EC2_INSTANCE_ID }}" ]; then
            echo "❌ Error: AWS_EC2_INSTANCE_ID secret is not set"
            exit 1
          fi

          if [ -z "${{ secrets.EC2_TARGET_DIR }}" ]; then
            echo "❌ Error: EC2_TARGET_DIR secret is not set"
            exit 1
          fi

          TIMESTAMP=$(date +%s)
          DEPLOY_KEY="deploy-${TIMESTAMP}.tar.gz"
          aws s3 cp deploy.tar.gz s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/$DEPLOY_KEY || exit 1

          # Debug: Verify instance is accessible via SSM
          echo "🔍 Checking if instance is accessible via SSM..."
          INSTANCE_ID="${{ secrets.AWS_EC2_INSTANCE_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          echo "Instance ID: $INSTANCE_ID"
          echo "Region: $AWS_REGION"

          # Verify AWS account and region
          echo "📋 Verifying AWS credentials and region..."
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "unknown")
          echo "AWS Account ID: $AWS_ACCOUNT_ID"
          echo "Target Region: $AWS_REGION"

          # First, check EC2 instance state (optional - may fail if permissions are missing)
          echo "📋 Checking EC2 instance state..."
          set +e
          EC2_CHECK_OUTPUT=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text 2>&1)
          EC2_CHECK_EXIT=$?
          set -e

          if [ $EC2_CHECK_EXIT -eq 0 ]; then
            INSTANCE_STATE="$EC2_CHECK_OUTPUT"
            echo "✅ Instance found! State: $INSTANCE_STATE"
            if [ "$INSTANCE_STATE" != "running" ]; then
              echo "⚠️  Warning: Instance is not in 'running' state. Current state: $INSTANCE_STATE"
              echo "Continuing anyway - SSM will handle the error if instance is not accessible."
            fi
          else
            echo "❌ Error: Could not find instance $INSTANCE_ID in region $AWS_REGION"
            echo "Error details: $EC2_CHECK_OUTPUT"
            echo ""
            echo "🔧 Possible causes:"
            echo "1. Instance ID is incorrect in GitHub secrets"
            echo "2. Region is incorrect in GitHub secrets (should be: eu-north-1)"
            echo "3. IAM user 'maahbusinessuser' doesn't have 'ec2:DescribeInstances' permission"
            echo "4. Instance is in a different AWS account"
            echo ""
            echo "💡 To fix:"
            echo "- Verify AWS_EC2_INSTANCE_ID secret matches: i-02eadf894425e2d48"
            echo "- Verify AWS_REGION secret is: eu-north-1"
            echo "- Add 'AmazonEC2ReadOnlyAccess' policy to IAM user 'maahbusinessuser'"
            echo ""
            echo "⚠️  Continuing with SSM check anyway (instance might still be accessible)..."
          fi

          # Check if instance is registered in SSM
          echo "📋 Checking SSM registration..."
          set -e  # Re-enable exit on error for critical commands
          INSTANCE_INFO=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --output json 2>/dev/null || echo '{"InstanceInformationList":[]}')

          INSTANCE_COUNT=$(echo "$INSTANCE_INFO" | jq -r '.InstanceInformationList | length' 2>/dev/null || echo "0")

          if [ "$INSTANCE_COUNT" -eq 0 ]; then
            echo "⚠️  Warning: Instance $INSTANCE_ID not found in SSM Fleet Manager via describe-instance-information"
            echo "However, the instance may still be accessible via SSM send-command."
            echo "Attempting to send command anyway..."
            echo ""
            echo "💡 If this fails, check:"
            echo "1. SSM Agent is running: sudo snap services amazon-ssm-agent"
            echo "2. IAM role has 'AmazonSSMManagedInstanceCore' policy"
            echo "3. Security Groups allow outbound HTTPS (443)"
          else
            echo "✅ Instance is registered in SSM"
            echo "$INSTANCE_INFO" | jq '.InstanceInformationList[0]' 2>/dev/null || echo "$INSTANCE_INFO"
          fi

          echo "📤 Sending deployment command to instance..."
          set +e  # Don't exit on error for send-command check
          COMMAND_OUTPUT=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'echo \"📦 Starting deployment...\"',
              'echo \"📁 Creating target directory...\"',
              'mkdir -p ${{ secrets.EC2_TARGET_DIR }}',
              'cd ${{ secrets.EC2_TARGET_DIR }}',
              'echo \"🔍 Checking AWS CLI installation...\"',
              'if ! command -v aws &> /dev/null; then',
              '  echo \"❌ AWS CLI is not installed. Installing...\"',
              '  curl \"https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip\" -o \"/tmp/awscliv2.zip\"',
              '  unzip -q /tmp/awscliv2.zip -d /tmp',
              '  sudo /tmp/aws/install',
              '  rm -rf /tmp/aws /tmp/awscliv2.zip',
              'fi',
              'echo \"✅ AWS CLI version: $(aws --version)\"',
              'echo \"📥 Downloading deployment archive from S3...\"',
              'aws s3 cp s3://${{ secrets.AWS_S3_DEPLOY_BUCKET }}/$DEPLOY_KEY /tmp/deploy.tar.gz || {',
              '  echo \"❌ Failed to download from S3. Check IAM role permissions.\";',
              '  exit 1;',
              '}',
              'echo \"📦 Extracting deployment archive...\"',
              'tar -xzf /tmp/deploy.tar.gz',
              'rm -f /tmp/deploy.tar.gz',
              'echo \"✅ Files deployed successfully\"'
            ]" \
            --output text \
            --query "Command.CommandId" 2>&1)
          SEND_COMMAND_EXIT=$?
          set -e

          if [ $SEND_COMMAND_EXIT -ne 0 ]; then
            echo "❌ Error: Failed to send command to instance"
            echo "Error output: $COMMAND_OUTPUT"
            echo ""
            if echo "$COMMAND_OUTPUT" | grep -q "InvalidInstanceId\|not in a valid state"; then
              echo "🔴 This error means the instance is NOT registered in SSM Fleet Manager."
              echo ""
              echo "🔧 REQUIRED FIXES (do all of these):"
              echo ""
              echo "1. ✅ Verify IAM Role on Instance:"
              echo "   - Go to EC2 → Instances → Select instance → Security tab"
              echo "   - Verify IAM role 'maahbusiness-ec2' is attached"
              echo "   - Go to IAM → Roles → maahbusiness-ec2 → Permissions"
              echo "   - MUST have 'AmazonSSMManagedInstanceCore' policy attached"
              echo ""
              echo "2. ✅ Verify SSM Agent is Running:"
              echo "   - Connect to instance via SSM Session Manager"
              echo "   - Run: sudo snap services amazon-ssm-agent"
              echo "   - Should show 'enabled active'"
              echo "   - If not, run: sudo snap restart amazon-ssm-agent"
              echo ""
              echo "3. ✅ Check Security Groups:"
              echo "   - EC2 → Instances → Select instance → Security tab"
              echo "   - Click on Security Group → Outbound rules"
              echo "   - MUST allow HTTPS (443) to 0.0.0.0/0 or SSM VPC endpoints"
              echo ""
              echo "4. ✅ Restart Instance:"
              echo "   - EC2 → Instances → Select instance"
              echo "   - Actions → Instance State → Reboot"
              echo "   - Wait 5-10 minutes after restart"
              echo ""
              echo "5. ✅ Verify in Systems Manager:"
              echo "   - Go to Systems Manager → Fleet Manager"
              echo "   - Search for instance ID: $INSTANCE_ID"
              echo "   - Instance MUST appear in the list before deployment will work"
              echo ""
              echo "⚠️  The instance MUST appear in Systems Manager → Fleet Manager before"
              echo "   GitHub Actions can deploy to it. This is a hard requirement."
            else
              echo "🔧 Troubleshooting:"
              echo "1. Verify the instance IAM role 'maahbusiness-ec2' has 'AmazonSSMManagedInstanceCore' policy"
              echo "2. Check SSM Agent is running: sudo snap services amazon-ssm-agent"
              echo "3. Verify Security Groups allow outbound HTTPS (443)"
              echo "4. Try restarting the EC2 instance"
            fi
            exit 1
          fi

          COMMAND_ID="$COMMAND_OUTPUT"
          echo "✅ Command sent successfully"
          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

          # Wait for command to complete with polling
          echo "⏳ Waiting for command to complete..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          STATUS="InProgress"

          while [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; do
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "❌ Timeout: Command took too long to complete"
              exit 1
            fi

            sleep 5
            ATTEMPT=$((ATTEMPT + 1))

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "Status" \
              --output text 2>/dev/null || echo "Unknown")

            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS - Status: $STATUS"
          done

          echo ""
          echo "📋 Command completed with status: $STATUS"
          echo ""

          # Get full command output
          echo "📄 Standard Output:"
          echo "----------------------------------------"
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "StandardOutputContent" \
            --output text 2>/dev/null || echo "(empty)")
          echo "$OUTPUT"
          echo "----------------------------------------"
          echo ""

          # Get error output
          ERROR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "StandardErrorContent" \
            --output text 2>/dev/null || echo "(empty)")

          if [ -n "$ERROR" ] && [ "$ERROR" != "(empty)" ]; then
            echo "📄 Standard Error:"
            echo "----------------------------------------"
            echo "$ERROR"
            echo "----------------------------------------"
            echo ""
          fi

          # Check final status
          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            echo ""
            echo "🔧 Troubleshooting:"
            echo "1. Check the error output above"
            echo "2. Verify the instance has AWS CLI installed and configured"
            echo "3. Verify the instance IAM role has S3 read permissions for the deployment bucket"
            echo "4. Check the target directory exists and is writable"
            echo "5. Connect to the instance via SSM Session Manager and check logs manually"
            exit 1
          fi

          echo "✅ Deployment completed successfully!"

  test_configuration:
    name: Test production configuration on EC2
    runs-on: ubuntu-latest
    needs: deploy_code

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Test configuration on EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.AWS_EC2_INSTANCE_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export TARGET_DIR=\"${{ secrets.EC2_TARGET_DIR }}\"',
              'export PROD_ENV=\"${{ secrets.PROD_ENV }}\"',
              'echo \"📝 Writing .env file...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && echo \\\"$PROD_ENV\\\" > .env\"',
              'echo \"📦 Checking/installing uv for ubuntu user...\"',
              'if ! sudo -u ubuntu /home/ubuntu/.local/bin/uv --version >/dev/null 2>&1; then',
              '  sudo -u ubuntu bash -c \"curl -LsSf https://astral.sh/uv/install.sh | sh\"',
              'fi',
              'echo \"📦 Installing/updating dependencies...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv sync --frozen\"',
              'echo \"🔍 Checking required environment variables...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && required_vars=(SECRET_KEY JWT_SECRET_KEY DATABASE_NAME DATABASE_USER DATABASE_PASSWORD DATABASE_HOST DATABASE_PORT REDIS_URL) && for var in \\\"\\${required_vars[@]}\\\"; do if [ -z \\\"\\${!var}\\\" ]; then echo \\\"❌ Missing required environment variable: $var\\\"; exit 1; fi; done\"',
              'echo \"🔍 Checking for pending migrations...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py makemigrations --check\"; then',
              '  echo \"❌ Pending migrations detected\"',
              '  exit 1',
              'fi',
              'echo \"🔍 Testing collectstatic (dry-run)...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py collectstatic --noinput --dry-run\"; then',
              '  echo \"❌ collectstatic dry-run failed\"',
              '  exit 1',
              'fi',
              'echo \"🔍 Running Django deploy checks...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py check --deploy\"; then',
              '  echo \"❌ Django deploy checks failed\"',
              '  exit 1',
              'fi',
              'echo \"✅ Configuration tests passed successfully.\"'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          # Wait and check status
          sleep 15

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardOutputContent" \
            --output text)

          ERROR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardErrorContent" \
            --output text)

          echo "$OUTPUT"
          if [ -n "$ERROR" ]; then
            echo "Errors: $ERROR"
          fi

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Configuration test failed with status: $STATUS"
            exit 1
          fi

  remote_setup_and_launch:
    name: Apply migrations and launch services on EC2
    runs-on: ubuntu-latest
    needs: test_configuration

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup and deploy on EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.AWS_EC2_INSTANCE_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export TARGET_DIR=\"${{ secrets.EC2_TARGET_DIR }}\"',
              'echo \"📦 Checking/installing uv for ubuntu user...\"',
              'if ! sudo -u ubuntu /home/ubuntu/.local/bin/uv --version >/dev/null 2>&1; then',
              '  sudo -u ubuntu bash -c \"curl -LsSf https://astral.sh/uv/install.sh | sh\"',
              'fi',
              'echo \"📦 Installing/updating dependencies...\"',
              'sudo -u ubuntu bash -c \"cd $TARGET_DIR && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv sync --frozen\"',
              'echo \"🗄️  Applying database migrations...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py migrate\"; then',
              '  echo \"❌ Migrations failed!\"',
              '  exit 1',
              'fi',
              'echo \"📁 Collecting static files...\"',
              'if ! sudo -u ubuntu bash -c \"cd $TARGET_DIR && set -a && . ./.env && set +a && export PATH=\\\"/home/ubuntu/.local/bin:$PATH\\\" && uv run python manage.py collectstatic --noinput\"; then',
              '  echo \"❌ collectstatic failed!\"',
              '  exit 1',
              'fi',
              'echo \"📋 Supervisor status before restart...\"',
              'sudo supervisorctl status || true',
              'sudo supervisorctl reread',
              'sudo supervisorctl update',
              'echo \"🔄 Restarting mahplan services...\"',
              'sudo supervisorctl restart mahplan-web mahplan-celery mahplan-celerybeat',
              'sleep 5',
              'echo \"📋 Supervisor status after restart...\"',
              'sudo supervisorctl status mahplan-web mahplan-celery mahplan-celerybeat || true',
              'echo \"🔍 Verifying services are running...\"',
              'if ! sudo supervisorctl status mahplan-web | grep -q \"RUNNING\"; then',
              '  echo \"❌ mahplan-web failed to start!\"',
              '  sudo supervisorctl tail -100 mahplan-web stderr || true',
              '  exit 1',
              'fi',
              'if ! sudo supervisorctl status mahplan-celery | grep -q \"RUNNING\"; then',
              '  echo \"❌ mahplan-celery failed to start!\"',
              '  sudo supervisorctl tail -100 mahplan-celery stderr || true',
              '  exit 1',
              'fi',
              'if ! sudo supervisorctl status mahplan-celerybeat | grep -q \"RUNNING\"; then',
              '  echo \"❌ mahplan-celerybeat failed to start!\"',
              '  sudo supervisorctl tail -100 mahplan-celerybeat stderr || true',
              '  exit 1',
              'fi',
              'echo \"✅ All Supervisor services are running\"',
              'if sudo nginx -t; then',
              '  sudo systemctl reload nginx',
              '  echo \"✅ nginx reloaded successfully\"',
              'else',
              '  echo \"❌ nginx configuration test failed!\"',
              '  exit 1',
              'fi',
              'echo \"✅ Deployment completed successfully.\"'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          sleep 20

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardOutputContent" \
            --output text)

          ERROR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardErrorContent" \
            --output text)

          echo "$OUTPUT"
          if [ -n "$ERROR" ]; then
            echo "Errors: $ERROR"
          fi

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            exit 1
          fi
