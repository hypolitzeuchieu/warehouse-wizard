name: Deploy RetailPulse to EC2

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy_backend:
    name: Deploy Django App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Get and clean variables (remove leading/trailing whitespace)
          EC2_HOST=$(echo "${{ secrets.EC2_HOST }}" | xargs)
          EC2_PORT=$(echo "${{ secrets.EC2_PORT || 22 }}" | xargs)

          if [ -z "$EC2_HOST" ]; then
            echo "❌ Error: EC2_HOST secret is not set or is empty"
            exit 1
          fi

          # Validate hostname format
          if [[ "$EC2_HOST" =~ [[:space:]] ]]; then
            echo "❌ Error: EC2_HOST contains spaces. Please remove spaces from the secret."
            echo "   Current value: '$EC2_HOST'"
            exit 1
          fi

          echo "🔍 Testing SSH connection to $EC2_HOST:$EC2_PORT..."
          ssh-keyscan -H -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts || true

      - name: Fix permissions on target directory
        run: |
          EC2_HOST=$(echo "${{ secrets.EC2_HOST }}" | xargs)
          EC2_USER=$(echo "${{ secrets.EC2_USER }}" | xargs)
          EC2_PORT=$(echo "${{ secrets.EC2_PORT || 22 }}" | xargs)
          TARGET_DIR=$(echo "${{ secrets.EC2_TARGET_DIR }}" | xargs)

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p $EC2_PORT $EC2_USER@$EC2_HOST \
            "chown -R $EC2_USER:$EC2_USER $TARGET_DIR && chmod -R 755 $TARGET_DIR"

      - name: Copy backend files via rsync
        run: |
          EC2_HOST=$(echo "${{ secrets.EC2_HOST }}" | xargs)
          EC2_USER=$(echo "${{ secrets.EC2_USER }}" | xargs)
          EC2_PORT=$(echo "${{ secrets.EC2_PORT || 22 }}" | xargs)
          TARGET_DIR=$(echo "${{ secrets.EC2_TARGET_DIR }}" | xargs)

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='db.sqlite3' \
            --exclude='celerybeat-schedule.db' \
            --exclude='*.log' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p $EC2_PORT" \
            stockmanagement/ "$EC2_USER@$EC2_HOST:$TARGET_DIR/"

  test_configuration:
    name: Test production configuration
    runs-on: ubuntu-latest
    needs: deploy_backend

    steps:
      - name: Test configuration on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            cd ${{ secrets.EC2_TARGET_DIR }}

            echo "📝 Writing .env file..."
            echo "${{ secrets.PROD_ENV }}" > .env

            echo "📦 Checking/installing uv..."
            if ! /home/ubuntu/.local/bin/uv --version >/dev/null 2>&1; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
            fi
            export PATH="/home/ubuntu/.local/bin:$PATH"

            echo "📦 Installing/updating dependencies..."
            /home/ubuntu/.local/bin/uv sync --frozen

            echo "🔍 Checking required environment variables..."
            set -a
            . ./.env
            set +a
            required_vars=(SECRET_KEY JWT_SECRET_KEY DATABASE_NAME DATABASE_USER DATABASE_PASSWORD DATABASE_HOST DATABASE_PORT REDIS_URL)
            for var in "${required_vars[@]}"; do
              if [ -z "${!var}" ]; then
                echo "❌ Missing required environment variable: $var"
                exit 1
              fi
            done

            echo "🔍 Checking for pending migrations..."
            if ! /home/ubuntu/.local/bin/uv run python manage.py makemigrations --check; then
              echo "❌ Pending migrations detected"
              exit 1
            fi

            echo "🔍 Testing collectstatic (dry-run)..."
            if ! /home/ubuntu/.local/bin/uv run python manage.py collectstatic --noinput --dry-run; then
              echo "❌ collectstatic dry-run failed"
              exit 1
            fi

            echo "🔍 Running Django deploy checks..."
            if ! /home/ubuntu/.local/bin/uv run python manage.py check --deploy; then
              echo "❌ Django deploy checks failed"
              exit 1
            fi

            echo "✅ Configuration tests passed successfully."

  remote_setup:
    name: Apply migrations and launch services
    runs-on: ubuntu-latest
    needs: test_configuration

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            cd ${{ secrets.EC2_TARGET_DIR }}

            echo "${{ secrets.PROD_ENV }}" > .env

            /home/ubuntu/.local/bin/uv sync --frozen

            /home/ubuntu/.local/bin/uv run python manage.py migrate

            /home/ubuntu/.local/bin/uv run python manage.py collectstatic --noinput

            sudo supervisorctl reread
            sudo supervisorctl update

            echo "🔄 Restarting maahbusiness services..."
            sudo supervisorctl restart maahbusiness-web maahbusiness-celery maahbusiness-celerybeat || true
            sleep 5

            echo "📋 Supervisor status after restart..."
            sudo supervisorctl status maahbusiness-web maahbusiness-celery maahbusiness-celerybeat || true

            echo "🔍 Verifying services are running..."
            if ! sudo supervisorctl status maahbusiness-web | grep -q "RUNNING"; then
              echo "❌ maahbusiness-web failed to start!"
              sudo supervisorctl tail -100 maahbusiness-web stderr || true
              exit 1
            fi

            if ! sudo supervisorctl status maahbusiness-celery | grep -q "RUNNING"; then
              echo "❌ maahbusiness-celery failed to start!"
              sudo supervisorctl tail -100 maahbusiness-celery stderr || true
              exit 1
            fi

            if ! sudo supervisorctl status maahbusiness-celerybeat | grep -q "RUNNING"; then
              echo "❌ maahbusiness-celerybeat failed to start!"
              sudo supervisorctl tail -100 maahbusiness-celerybeat stderr || true
              exit 1
            fi

            echo "✅ All Supervisor services are running"

            if sudo nginx -t; then
              sudo systemctl reload nginx
              echo "✅ nginx reloaded successfully"
            else
              echo "❌ nginx configuration test failed!"
              exit 1
            fi

            echo "✅ Deployment completed successfully."
