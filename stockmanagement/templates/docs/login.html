<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <title>Documentation Access - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #fcc;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .submit-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .security-note {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .security-note strong {
            color: #333;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Documentation Access</h1>
            <p>Please enter your credentials to access the API documentation</p>
        </div>

        {% if error %}
        <div class="error-message show" id="errorMessage">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{% url 'doc-login' %}" id="loginForm">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="submit-button" id="submitButton">
                Sign In
            </button>
        </form>

        <div class="security-note">
            <strong>Security Notice:</strong> This page is protected against common web attacks including CSRF, XSS, and brute force attempts.
        </div>
    </div>

    <script>
        // Client-side validation and security
        (function() {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const submitButton = document.getElementById('submitButton');
            const errorMessage = document.getElementById('errorMessage');

            // Sanitize input to prevent XSS and injection attacks
            function sanitizeInput(input) {
                // Remove potentially dangerous characters
                return input.replace(/[<>\"'%;()&+]/g, '').trim();
            }

            // Validate username format (alphanumeric, underscore, hyphen only)
            function isValidUsername(username) {
                return /^[a-zA-Z0-9_-]+$/.test(username);
            }

            // Validate form before submission
            form.addEventListener('submit', function(e) {
                const rawUsername = usernameInput.value.trim();
                const username = sanitizeInput(rawUsername);
                const password = passwordInput.value;

                // Validate username
                if (!username || username.length < 3 || username.length > 150) {
                    e.preventDefault();
                    showError('Invalid credentials. Please try again.');
                    return false;
                }

                if (!isValidUsername(username)) {
                    e.preventDefault();
                    showError('Invalid credentials. Please try again.');
                    return false;
                }

                // Validate password
                if (!password || password.length < 6) {
                    e.preventDefault();
                    showError('Invalid credentials. Please try again.');
                    return false;
                }

                // Disable submit button to prevent double submission
                submitButton.disabled = true;
                submitButton.textContent = 'Signing in...';

                // Update form values with sanitized input
                usernameInput.value = username;
            });

            // Show error message
            function showError(message) {
                if (errorMessage) {
                    errorMessage.textContent = message;
                    errorMessage.classList.add('show');
                } else {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message show';
                    errorDiv.id = 'errorMessage';
                    errorDiv.textContent = message;
                    form.insertBefore(errorDiv, form.firstChild);
                }
            }

            // Clear error on input
            [usernameInput, passwordInput].forEach(input => {
                input.addEventListener('input', function() {
                    if (errorMessage) {
                        errorMessage.classList.remove('show');
                    }
                    submitButton.disabled = false;
                    submitButton.textContent = 'Sign In';
                });
            });

            // Prevent form autofill from revealing password
            passwordInput.addEventListener('paste', function(e) {
                setTimeout(() => {
                    if (passwordInput.value.length > 0) {
                        passwordInput.type = 'password';
                    }
                }, 10);
            });
        })();
    </script>
</body>
</html>
