    // Connexion WebSocket avec token
   const socket = new WebSocket(`ws://127.0.0.1:8000/ws/notifications/?token=${token}`);

    socket.onopen = function () {
        console.log("✅ WebSocket connecté !");
    };

    socket.onmessage = function (event) {
        console.log("🔔 Message reçu :", event.data);

        try {
            const data = JSON.parse(event.data);

            // Afficher la notification dans la page
            const notificationDiv = document.createElement("div");
            notificationDiv.className = "notification";
            notificationDiv.innerHTML = `
                <p><strong>Type:</strong> ${data.notification_type || 'N/A'}</p>
                <p><strong>Message:</strong> ${data.message || 'N/A'}</p>
                <p><strong>Produit:</strong> ${data.product || 'N/A'}</p>
                <p><strong>Date:</strong> ${data.created_at || 'N/A'}</p>
                <hr>
            `;
            document.getElementById("notifications-container").appendChild(notificationDiv);
        } catch (error) {
            console.error("Erreur lors du traitement du message:", error);
        }
    };

    socket.onerror = function (error) {
        console.error("❌ WebSocket erreur:", error);
    };

    socket.onclose = function (event) {
        console.log(`❌ WebSocket déconnecté ! Code: ${event.code}, Raison: ${event.reason}`);
    };
</script>

<div id="notifications-container"></div>
