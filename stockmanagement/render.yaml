services:
  - type: web
    name: stockmanagement
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn stockmanagement.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockmanagement-db
          property: connectionString

databases:
  - name: stockmanagement-db
    databaseName: stockdb
    user: stockuser
